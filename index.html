<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DormSphere | Welcome</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>
  <div class="bg-orb orb-three"></div>

  <main class="auth-container">
    <section class="brand-panel">
      <p class="mini-label">Student Living OS</p>
      <h1>DormSphere</h1>
      <p class="brand-line">
        Your hostel life, organized in one luxurious digital space.
      </p>

      <div class="brand-points">
        <span>AI Help</span>
        <span>Mess Reviews</span>
        <span>Budget</span>
        <span>Lost & Found</span>
      </div>
    </section>

    <section class="login-card">
      <h2>Welcome back</h2>
      <p>Login to enter your personal dorm dashboard.</p>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required />

        <button type="submit" class="main-btn">Enter DormSphere</button>
      </form>

      <button class="google-btn">Continue with Google</button>

      <p class="switch-text">
        New here? <a href="#">Create your student account</a>
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
